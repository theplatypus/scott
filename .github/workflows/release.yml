name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  id-token: write

jobs:
  build-wheels:
    name: Wheels (${{ matrix.asset_os }}-${{ matrix.asset_arch }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            asset_os: linux
            asset_arch: x86_64
            use_manylinux: true
          - os: ubuntu-24.04-arm
            target: aarch64-unknown-linux-gnu
            asset_os: linux
            asset_arch: aarch64
            use_manylinux: true
          - os: macos-14
            target: aarch64-apple-darwin
            asset_os: macos
            asset_arch: arm64
            use_manylinux: false
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            asset_os: windows
            asset_arch: x86_64
            use_manylinux: false
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo
        uses: Swatinem/rust-cache@v2

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Build manylinux wheel
        if: matrix.use_manylinux
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          manylinux: auto
          args: --release --out dist -i python3.10

      - name: Build wheel
        if: ${{ !matrix.use_manylinux }}
        uses: PyO3/maturin-action@v1
        with:
          command: build
          target: ${{ matrix.target }}
          args: --release --out dist

      - name: Upload wheel artifact
        uses: actions/upload-artifact@v4
        with:
          name: wheels-${{ matrix.asset_os }}-${{ matrix.asset_arch }}
          path: dist/*.whl
          if-no-files-found: error

  build-sdist:
    name: Source distribution
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Build sdist
        uses: PyO3/maturin-action@v1
        with:
          command: sdist
          args: --out dist

      - name: Upload sdist artifact
        uses: actions/upload-artifact@v4
        with:
          name: sdist
          path: dist/*.tar.gz
          if-no-files-found: error

  test-wheel:
    name: Test wheel (py${{ matrix.python-version }})
    needs: build-wheels
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Download Linux x86_64 wheel
        uses: actions/download-artifact@v4
        with:
          name: wheels-linux-x86_64
          path: wheelhouse

      - name: Install wheel + test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --no-index --find-links wheelhouse scott-trace
          python -m pip install pytest

      - name: Run unit tests
        run: pytest test/pytest/ -v -m unit

  release:
    name: GitHub Release
    needs: [build-wheels, build-sdist, test-wheel]
    runs-on: ubuntu-latest
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true

  publish-pypi:
    name: Publish to TestPyPI
    needs: [build-wheels, build-sdist, test-wheel]
    runs-on: ubuntu-latest
    environment: testpypi
    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish to TestPyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          repository-url: https://test.pypi.org/legacy/
