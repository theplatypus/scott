name: CI

on:
  push:
  pull_request:

jobs:
  rust-build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
      - name: Build (default)
        run: cargo build
      - name: Test (lib)
        run: cargo test --lib
      - name: Build (parallel feature)
        run: cargo build --features parallel
